<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TravelSphere - Immersive Travel Journal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Import Map for React & Three.js ecosystem -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "three": "https://esm.sh/three@0.161.0",
                "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.16?external=react,react-dom,three",
                "@react-three/drei": "https://esm.sh/@react-three/drei@9.102.0?external=react,react-dom,three,@react-three/fiber",
                "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
            }
        }
    </script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #020408; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        
        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }
        
        .glass-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            transition: all 0.2s ease;
        }
        
        .glass-input:focus {
            outline: none;
            border-color: rgba(59, 130, 246, 0.6);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Hide scrollbar for gallery */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }

        /* Fullscreen image viewer */
        .fullscreen-viewer {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-viewer img,
        .fullscreen-viewer video {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            cursor: zoom-in;
        }

        .fullscreen-viewer.zoomed img,
        .fullscreen-viewer.zoomed video {
            max-width: none;
            max-height: none;
            cursor: zoom-out;
        }

        /* Pulse animation for pins */
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, Suspense, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';
        import { OrbitControls, Stars, useTexture } from '@react-three/drei';
        import { 
            MapPin, Plus, X, Calendar, Camera, Search, 
            Image as ImageIcon, ZoomIn, ZoomOut, ChevronLeft, 
            ChevronRight, Maximize2, Play, Trash2, Info
        } from 'lucide-react';

        // --- Constants & Utilities ---
        const EARTH_RADIUS = 2;
        
        // Convert Lat/Lon to 3D Vector on Sphere
        const latLonToVector3 = (lat, lon, radius = EARTH_RADIUS) => {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = radius * Math.sin(phi) * Math.sin(theta);
            const y = radius * Math.cos(phi);
            
            return new THREE.Vector3(x, y, z);
        };

        // Format date nicely
        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('it-IT', { 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric' 
            });
        };

        // --- 3D Components ---

        const Marker = ({ trip, onClick, isSelected }) => {
            const position = useMemo(() => latLonToVector3(trip.lat, trip.lon, EARTH_RADIUS + 0.03), [trip.lat, trip.lon]);
            const meshRef = useRef();
            const ringRef = useRef();

            useFrame((state) => {
                if (meshRef.current) {
                    const baseScale = isSelected ? 1.6 : 1;
                    const pulse = Math.sin(state.clock.elapsedTime * 2.5) * 0.08;
                    meshRef.current.scale.setScalar(baseScale + pulse);
                    meshRef.current.lookAt(0, 0, 0);
                }
                if (ringRef.current) {
                    ringRef.current.rotation.z += 0.02;
                }
            });

            return (
                <group position={position}>
                    {/* Outer glow ring */}
                    <mesh ref={ringRef} rotation={[Math.PI/2, 0, 0]}>
                        <ringGeometry args={[0.1, 0.14, 32]} />
                        <meshBasicMaterial 
                            color={isSelected ? "#60A5FA" : "#F87171"} 
                            transparent 
                            opacity={isSelected ? 0.6 : 0.4}
                            side={THREE.DoubleSide}
                        />
                    </mesh>
                    
                    {/* Main pin sphere */}
                    <mesh 
                        ref={meshRef} 
                        onClick={(e) => { e.stopPropagation(); onClick(trip); }}
                        onPointerOver={() => document.body.style.cursor = 'pointer'}
                        onPointerOut={() => document.body.style.cursor = 'default'}
                    >
                        <sphereGeometry args={[0.07, 20, 20]} />
                        <meshStandardMaterial 
                            color={isSelected ? "#3B82F6" : "#EF4444"} 
                            emissive={isSelected ? "#1D4ED8" : "#B91C1C"}
                            emissiveIntensity={0.7}
                            roughness={0.2}
                            metalness={0.9}
                        />
                    </mesh>
                    
                    {/* Pin stem */}
                    <mesh position={[0, 0, -0.05]} rotation={[Math.PI/2, 0, 0]}>
                        <cylinderGeometry args={[0.012, 0.012, 0.1, 8]} />
                        <meshBasicMaterial color="#ffffff" opacity={0.6} transparent />
                    </mesh>

                    {/* Inner glow */}
                    <pointLight 
                        color={isSelected ? "#60A5FA" : "#EF4444"} 
                        intensity={isSelected ? 0.5 : 0.3} 
                        distance={0.5} 
                    />
                </group>
            );
        };

        // Earth component with error boundary for textures
        const EarthSphere = ({ trips, onMarkerClick, selectedTripId }) => {
            const earthGroupRef = useRef();
            
            // Single reliable texture
            const colorMap = useTexture('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');

            useFrame(() => {
                if (earthGroupRef.current) {
                    earthGroupRef.current.rotation.y += 0.0002;
                }
            });

            return (
                <group ref={earthGroupRef}>
                    {/* Earth Mesh */}
                    <mesh>
                        <sphereGeometry args={[EARTH_RADIUS, 64, 64]} />
                        <meshStandardMaterial 
                            map={colorMap} 
                            roughness={0.8}
                            metalness={0.1}
                        />
                    </mesh>

                    {/* Markers rotate with earth */}
                    {trips.map(trip => (
                        <Marker 
                            key={trip.id} 
                            trip={trip} 
                            onClick={onMarkerClick}
                            isSelected={selectedTripId === trip.id}
                        />
                    ))}
                </group>
            );
        };

        // Fallback Earth without textures
        const EarthFallback = ({ trips, onMarkerClick, selectedTripId }) => {
            const earthGroupRef = useRef();

            useFrame(() => {
                if (earthGroupRef.current) {
                    earthGroupRef.current.rotation.y += 0.0002;
                }
            });

            return (
                <group ref={earthGroupRef}>
                    <mesh>
                        <sphereGeometry args={[EARTH_RADIUS, 64, 64]} />
                        <meshStandardMaterial 
                            color="#1e3a5f"
                            roughness={0.7}
                            metalness={0.3}
                        />
                    </mesh>
                    {trips.map(trip => (
                        <Marker 
                            key={trip.id} 
                            trip={trip} 
                            onClick={onMarkerClick}
                            isSelected={selectedTripId === trip.id}
                        />
                    ))}
                </group>
            );
        };

        // Error boundary wrapper
        const Earth = ({ trips, onMarkerClick, selectedTripId }) => {
            const [hasError, setHasError] = useState(false);

            if (hasError) {
                return <EarthFallback trips={trips} onMarkerClick={onMarkerClick} selectedTripId={selectedTripId} />;
            }

            return (
                <group>
                    <Suspense fallback={<EarthFallback trips={trips} onMarkerClick={onMarkerClick} selectedTripId={selectedTripId} />}>
                        <EarthSphere trips={trips} onMarkerClick={onMarkerClick} selectedTripId={selectedTripId} />
                    </Suspense>
                    
                    {/* Atmosphere glow - always visible */}
                    <mesh scale={[1.03, 1.03, 1.03]}>
                        <sphereGeometry args={[EARTH_RADIUS, 32, 32]} />
                        <meshBasicMaterial 
                            color="#60a5fa" 
                            transparent 
                            opacity={0.12} 
                            side={THREE.BackSide} 
                            blending={THREE.AdditiveBlending}
                        />
                    </mesh>
                </group>
            );
        };

        // --- UI Components ---

        // Fullscreen Media Viewer with Zoom
        const FullscreenViewer = ({ media, initialIndex, onClose }) => {
            const [currentIndex, setCurrentIndex] = useState(initialIndex || 0);
            const [isZoomed, setIsZoomed] = useState(false);
            const containerRef = useRef();

            const currentItem = media[currentIndex];

            const handlePrev = (e) => {
                e.stopPropagation();
                setCurrentIndex(prev => (prev > 0 ? prev - 1 : media.length - 1));
                setIsZoomed(false);
            };

            const handleNext = (e) => {
                e.stopPropagation();
                setCurrentIndex(prev => (prev < media.length - 1 ? prev + 1 : 0));
                setIsZoomed(false);
            };

            const toggleZoom = () => setIsZoomed(!isZoomed);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') onClose();
                    if (e.key === 'ArrowLeft') handlePrev(e);
                    if (e.key === 'ArrowRight') handleNext(e);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            return (
                <div 
                    className={`fullscreen-viewer ${isZoomed ? 'zoomed' : ''}`}
                    onClick={onClose}
                    ref={containerRef}
                >
                    {/* Close button */}
                    <button 
                        onClick={onClose}
                        className="absolute top-4 right-4 z-10 bg-white/10 hover:bg-white/20 p-3 rounded-full transition"
                    >
                        <X size={28} className="text-white" />
                    </button>

                    {/* Zoom toggle */}
                    <button 
                        onClick={(e) => { e.stopPropagation(); toggleZoom(); }}
                        className="absolute top-4 left-4 z-10 bg-white/10 hover:bg-white/20 p-3 rounded-full transition"
                    >
                        {isZoomed ? <ZoomOut size={24} className="text-white" /> : <ZoomIn size={24} className="text-white" />}
                    </button>

                    {/* Counter */}
                    <div className="absolute top-4 left-1/2 -translate-x-1/2 z-10 bg-black/50 px-4 py-2 rounded-full text-white text-sm font-medium">
                        {currentIndex + 1} / {media.length}
                    </div>

                    {/* Navigation arrows */}
                    {media.length > 1 && (
                        <>
                            <button 
                                onClick={handlePrev}
                                className="absolute left-4 top-1/2 -translate-y-1/2 z-10 bg-white/10 hover:bg-white/20 p-3 rounded-full transition"
                            >
                                <ChevronLeft size={32} className="text-white" />
                            </button>
                            <button 
                                onClick={handleNext}
                                className="absolute right-4 top-1/2 -translate-y-1/2 z-10 bg-white/10 hover:bg-white/20 p-3 rounded-full transition"
                            >
                                <ChevronRight size={32} className="text-white" />
                            </button>
                        </>
                    )}

                    {/* Media content */}
                    <div 
                        className={`overflow-auto ${isZoomed ? 'w-full h-full' : ''}`}
                        onClick={(e) => e.stopPropagation()}
                    >
                        {currentItem.type === 'video' ? (
                            <video 
                                src={currentItem.url} 
                                controls 
                                autoPlay
                                className={isZoomed ? 'w-auto h-auto' : ''}
                                style={isZoomed ? { maxWidth: 'none', maxHeight: 'none' } : {}}
                            />
                        ) : (
                            <img 
                                src={currentItem.url} 
                                alt={`Photo ${currentIndex + 1}`}
                                onClick={toggleZoom}
                                className={isZoomed ? 'w-auto h-auto' : ''}
                                style={isZoomed ? { maxWidth: 'none', maxHeight: 'none', transform: 'scale(1.5)' } : {}}
                            />
                        )}
                    </div>

                    {/* Thumbnails */}
                    {media.length > 1 && (
                        <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 bg-black/50 p-2 rounded-xl">
                            {media.map((item, idx) => (
                                <button
                                    key={idx}
                                    onClick={(e) => { e.stopPropagation(); setCurrentIndex(idx); setIsZoomed(false); }}
                                    className={`w-12 h-12 rounded-lg overflow-hidden border-2 transition ${
                                        idx === currentIndex ? 'border-blue-500' : 'border-transparent opacity-60 hover:opacity-100'
                                    }`}
                                >
                                    {item.type === 'video' ? (
                                        <div className="w-full h-full bg-gray-800 flex items-center justify-center">
                                            <Play size={16} className="text-white" />
                                        </div>
                                    ) : (
                                        <img src={item.url} alt="" className="w-full h-full object-cover" />
                                    )}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const TripForm = ({ onClose, onSave }) => {
            const [locationQuery, setLocationQuery] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            const [foundLocation, setFoundLocation] = useState(null);
            const [title, setTitle] = useState('');
            const [date, setDate] = useState('');
            const [description, setDescription] = useState('');
            const [mediaItems, setMediaItems] = useState([]);
            const [error, setError] = useState('');

            const handleGeocode = async () => {
                if (!locationQuery.trim()) return;
                setIsSearching(true);
                setError('');
                setFoundLocation(null);

                try {
                    const response = await fetch(
                        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationQuery)}&limit=1`,
                        { headers: { 'Accept-Language': 'it' } }
                    );
                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        const place = data[0];
                        setFoundLocation({
                            lat: parseFloat(place.lat),
                            lon: parseFloat(place.lon),
                            displayName: place.display_name
                        });
                        if (!title) setTitle(place.name || locationQuery);
                    } else {
                        setError('Luogo non trovato. Prova con un nome diverso.');
                    }
                } catch (err) {
                    setError('Errore di connessione. Riprova.');
                } finally {
                    setIsSearching(false);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!foundLocation) {
                    setError('Cerca prima un luogo valido');
                    return;
                }
                if (!title.trim()) {
                    setError('Inserisci un titolo per il viaggio');
                    return;
                }
                
                onSave({
                    title: title.trim(),
                    description: description.trim(),
                    date,
                    locationName: foundLocation.displayName,
                    lat: foundLocation.lat,
                    lon: foundLocation.lon,
                    media: mediaItems
                });
            };

            // Handle file selection - stores reference, not copy
            const handleMediaChange = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    const newItems = Array.from(e.target.files).map(file => ({
                        url: URL.createObjectURL(file),
                        type: file.type.startsWith('video') ? 'video' : 'image',
                        name: file.name,
                        size: file.size
                    }));
                    setMediaItems(prev => [...prev, ...newItems]);
                }
            };

            const removeMedia = (index) => {
                setMediaItems(prev => prev.filter((_, i) => i !== index));
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-md animate-fade-in">
                    <div className="glass-panel w-full max-w-xl rounded-3xl p-8 relative flex flex-col max-h-[90vh] animate-slide-up">
                        <button onClick={onClose} className="absolute top-5 right-5 text-gray-400 hover:text-white transition z-10">
                            <X size={26} />
                        </button>
                        
                        <h2 className="text-3xl font-bold mb-6 flex items-center gap-3">
                            <div className="bg-blue-600/20 p-2 rounded-xl">
                                <MapPin className="text-blue-400" size={28} />
                            </div>
                            Nuovo Viaggio
                        </h2>

                        <div className="overflow-y-auto pr-2 flex-1">
                            <form onSubmit={handleSubmit} className="space-y-5">
                                {/* Location Search */}
                                <div>
                                    <label className="block text-sm text-gray-400 mb-2 font-medium">Dove sei stato?</label>
                                    <div className="flex gap-3">
                                        <input 
                                            type="text" 
                                            value={locationQuery}
                                            onChange={(e) => setLocationQuery(e.target.value)}
                                            placeholder="es. Roma, Bali, New York..."
                                            className="glass-input flex-1 px-4 py-3 rounded-xl text-base"
                                            onKeyDown={(e) => e.key === 'Enter' && (e.preventDefault(), handleGeocode())}
                                        />
                                        <button 
                                            type="button" 
                                            onClick={handleGeocode}
                                            className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl flex items-center gap-2 transition font-medium"
                                            disabled={isSearching}
                                        >
                                            {isSearching ? <div className="loader" /> : <><Search size={20} /> Cerca</>}
                                        </button>
                                    </div>
                                    {error && <p className="text-red-400 text-sm mt-2 flex items-center gap-1"><Info size={14} /> {error}</p>}
                                    {foundLocation && (
                                        <div className="mt-2 p-3 bg-green-500/10 border border-green-500/30 rounded-xl">
                                            <p className="text-green-400 text-sm flex items-center gap-2">
                                                <MapPin size={16} />
                                                <span className="truncate">{foundLocation.displayName}</span>
                                            </p>
                                        </div>
                                    )}
                                </div>

                                {/* Details Section */}
                                <div className={`space-y-5 transition-all duration-300 ${!foundLocation ? 'opacity-40 pointer-events-none' : 'opacity-100'}`}>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 font-medium">Titolo del viaggio</label>
                                        <input 
                                            type="text" 
                                            value={title}
                                            onChange={(e) => setTitle(e.target.value)}
                                            placeholder="La mia avventura..."
                                            className="glass-input w-full px-4 py-3 rounded-xl"
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-2 font-medium">Data</label>
                                            <input 
                                                type="date" 
                                                value={date}
                                                onChange={(e) => setDate(e.target.value)}
                                                className="glass-input w-full px-4 py-3 rounded-xl"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-2 font-medium">Media selezionati</label>
                                            <div className="glass-input px-4 py-3 rounded-xl text-center">
                                                <span className="text-2xl font-bold text-blue-400">{mediaItems.length}</span>
                                                <span className="text-gray-400 text-sm ml-2">file</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 font-medium">Note (opzionale)</label>
                                        <textarea 
                                            value={description}
                                            onChange={(e) => setDescription(e.target.value)}
                                            placeholder="Racconta il tuo viaggio..."
                                            className="glass-input w-full px-4 py-3 rounded-xl resize-none h-20"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm text-gray-400 mb-2 font-medium">Foto e Video</label>
                                        <label className="flex items-center gap-4 cursor-pointer glass-input p-4 rounded-xl hover:bg-white/5 transition group border-dashed border-2 border-white/10 hover:border-blue-500/50">
                                            <div className="bg-gradient-to-br from-blue-600/30 to-cyan-600/30 p-3 rounded-xl group-hover:from-blue-600/50 group-hover:to-cyan-600/50 transition">
                                                <Camera size={24} className="text-blue-300"/>
                                            </div>
                                            <div>
                                                <p className="text-white font-medium">Seleziona dalla galleria</p>
                                                <p className="text-gray-500 text-sm">Foto e video rimangono sul dispositivo</p>
                                            </div>
                                            <input 
                                                type="file" 
                                                accept="image/*,video/*" 
                                                multiple 
                                                onChange={handleMediaChange} 
                                                className="hidden" 
                                            />
                                        </label>
                                        
                                        {/* Media Preview Grid */}
                                        {mediaItems.length > 0 && (
                                            <div className="mt-4 grid grid-cols-4 gap-2">
                                                {mediaItems.map((item, idx) => (
                                                    <div key={idx} className="relative aspect-square rounded-xl overflow-hidden border border-white/10 group">
                                                        {item.type === 'video' ? (
                                                            <div className="w-full h-full bg-gray-800 flex items-center justify-center">
                                                                <Play size={24} className="text-white/60" />
                                                            </div>
                                                        ) : (
                                                            <img src={item.url} alt="preview" className="w-full h-full object-cover" />
                                                        )}
                                                        <button 
                                                            type="button"
                                                            onClick={() => removeMedia(idx)}
                                                            className="absolute top-1 right-1 bg-red-500/90 hover:bg-red-600 text-white rounded-full p-1.5 opacity-0 group-hover:opacity-100 transition"
                                                        >
                                                            <X size={14} />
                                                        </button>
                                                        {item.type === 'video' && (
                                                            <div className="absolute bottom-1 left-1 text-[10px] font-bold bg-blue-600 px-2 py-0.5 rounded text-white uppercase">Video</div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <button 
                                        type="submit" 
                                        className="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-bold py-4 rounded-xl mt-4 shadow-lg shadow-blue-900/40 transition transform hover:scale-[1.02] flex items-center justify-center gap-2 text-lg"
                                    >
                                        <MapPin size={22} />
                                        Aggiungi Pin sulla Mappa
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const MemoryViewer = ({ trip, onClose }) => {
            const [fullscreenIndex, setFullscreenIndex] = useState(null);

            if (!trip) return null;

            const openFullscreen = (index) => {
                setFullscreenIndex(index);
            };

            return (
                <>
                    <div className="fixed inset-0 z-40 flex items-center justify-center p-6 bg-black/85 backdrop-blur-md animate-fade-in" onClick={onClose}>
                        <div className="w-full max-w-7xl h-[88vh] flex flex-col relative" onClick={e => e.stopPropagation()}>
                            
                            {/* Header */}
                            <div className="glass-panel rounded-2xl p-6 mb-4 flex justify-between items-start">
                                <div className="flex-1">
                                    <h2 className="text-4xl font-black tracking-tight text-white mb-2">{trip.title}</h2>
                                    <div className="flex items-center gap-6 text-gray-300">
                                        <span className="flex items-center gap-2">
                                            <MapPin size={18} className="text-blue-400" /> 
                                            {trip.locationName ? trip.locationName.split(',').slice(0, 2).join(',') : 'Luogo sconosciuto'}
                                        </span>
                                        {trip.date && (
                                            <span className="flex items-center gap-2">
                                                <Calendar size={18} className="text-blue-400" /> 
                                                {formatDate(trip.date)}
                                            </span>
                                        )}
                                        {trip.media && (
                                            <span className="flex items-center gap-2">
                                                <ImageIcon size={18} className="text-blue-400" /> 
                                                {trip.media.length} {trip.media.length === 1 ? 'media' : 'media'}
                                            </span>
                                        )}
                                    </div>
                                    {trip.description && (
                                        <p className="mt-3 text-gray-400 text-sm max-w-2xl">{trip.description}</p>
                                    )}
                                </div>
                                <button 
                                    onClick={onClose} 
                                    className="bg-white/10 hover:bg-white/20 p-3 rounded-xl text-white transition border border-white/10"
                                >
                                    <X size={24} />
                                </button>
                            </div>

                            {/* Gallery */}
                            <div className="flex-1 overflow-hidden rounded-2xl bg-black/30 border border-white/5">
                                {trip.media && trip.media.length > 0 ? (
                                    <div className="h-full overflow-x-auto overflow-y-hidden flex gap-4 p-4 scrollbar-hide items-center">
                                        {trip.media.map((item, idx) => (
                                            <div 
                                                key={idx} 
                                                className="group shrink-0 h-[calc(100%-2rem)] aspect-[4/3] relative rounded-xl overflow-hidden shadow-2xl bg-black/40 border border-white/10 cursor-pointer hover:border-blue-500/50 transition-all hover:scale-[1.02]"
                                                onClick={() => openFullscreen(idx)}
                                            >
                                                {item.type === 'video' ? (
                                                    <div className="relative w-full h-full">
                                                        <video 
                                                            src={item.url} 
                                                            className="w-full h-full object-cover"
                                                            muted
                                                        />
                                                        <div className="absolute inset-0 flex items-center justify-center bg-black/30">
                                                            <div className="bg-white/20 backdrop-blur-sm p-4 rounded-full">
                                                                <Play size={32} className="text-white" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <img 
                                                        src={item.url} 
                                                        alt={`Memory ${idx + 1}`} 
                                                        className="w-full h-full object-cover" 
                                                    />
                                                )}
                                                
                                                {/* Fullscreen hint overlay */}
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition flex items-end justify-center pb-4">
                                                    <div className="flex items-center gap-2 text-white text-sm font-medium bg-black/40 backdrop-blur-sm px-3 py-1.5 rounded-full">
                                                        <Maximize2 size={16} />
                                                        Schermo intero
                                                    </div>
                                                </div>

                                                {item.type === 'video' && (
                                                    <div className="absolute top-3 left-3 bg-blue-600 px-2 py-1 rounded-lg text-xs font-bold text-white uppercase">
                                                        Video
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="w-full h-full flex flex-col items-center justify-center text-gray-500">
                                        <div className="bg-white/5 p-6 rounded-full mb-4">
                                            <ImageIcon size={48} className="opacity-40" />
                                        </div>
                                        <p className="text-xl font-medium">Nessun media</p>
                                        <p className="text-sm text-gray-600 mt-1">Aggiungi foto o video a questo viaggio</p>
                                    </div>
                                )}
                            </div>

                            {/* Navigation hint */}
                            {trip.media && trip.media.length > 2 && (
                                <div className="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-2 text-gray-500 text-sm">
                                    <ChevronLeft size={16} />
                                    <span>Scorri per vedere tutto</span>
                                    <ChevronRight size={16} />
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Fullscreen Viewer */}
                    {fullscreenIndex !== null && trip.media && (
                        <FullscreenViewer 
                            media={trip.media}
                            initialIndex={fullscreenIndex}
                            onClose={() => setFullscreenIndex(null)}
                        />
                    )}
                </>
            );
        };

        const Header = ({ tripCount }) => (
            <div className="absolute top-0 left-0 w-full p-6 z-10 pointer-events-none flex justify-between items-start">
                <div>
                    <h1 className="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-cyan-300 to-teal-200 drop-shadow-lg">
                        TRAVELSPHERE
                    </h1>
                    <p className="text-blue-200/60 text-sm font-light tracking-[0.3em] uppercase mt-1">Diario di Viaggio Immersivo</p>
                </div>
                <div className="glass-panel rounded-full px-5 py-2.5 flex items-center gap-3 pointer-events-auto">
                    <MapPin size={18} className="text-blue-400" />
                    <span className="text-white font-semibold">{tripCount}</span>
                    <span className="text-gray-400 text-sm">{tripCount === 1 ? 'viaggio' : 'viaggi'}</span>
                </div>
            </div>
        );

        // Instructions overlay
        const Instructions = ({ visible, onDismiss }) => {
            if (!visible) return null;
            
            return (
                <div className="absolute bottom-24 left-1/2 -translate-x-1/2 z-20 glass-panel rounded-2xl px-6 py-4 flex items-center gap-4 animate-slide-up">
                    <div className="text-blue-400">
                        <Info size={24} />
                    </div>
                    <div>
                        <p className="text-white font-medium">Trascina per ruotare il globo</p>
                        <p className="text-gray-400 text-sm">Clicca sui pin rossi per vedere i dettagli del viaggio</p>
                    </div>
                    <button 
                        onClick={onDismiss}
                        className="text-gray-400 hover:text-white transition ml-2"
                    >
                        <X size={20} />
                    </button>
                </div>
            );
        };

        // --- Main App Component ---

        const App = () => {
            const [trips, setTrips] = useState([
                { 
                    id: '1', 
                    title: 'Avventura a Tokyo', 
                    lat: 35.6762, 
                    lon: 139.6503, 
                    locationName: 'Tokyo, Giappone', 
                    date: '2023-04-10',
                    description: 'Un viaggio indimenticabile nella terra del Sol Levante',
                    media: [
                        { type: 'image', url: 'https://images.unsplash.com/photo-1503899036084-c55cdd92da26?q=80&w=1200&auto=format&fit=crop' },
                        { type: 'image', url: 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?q=80&w=1200&auto=format&fit=crop' },
                        { type: 'image', url: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=1200&auto=format&fit=crop' }
                    ] 
                },
                { 
                    id: '2', 
                    title: 'Romance a Parigi', 
                    lat: 48.8566, 
                    lon: 2.3522, 
                    locationName: 'Parigi, Francia', 
                    date: '2022-09-15',
                    description: 'La città dell\'amore in tutto il suo splendore',
                    media: [
                        { type: 'image', url: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=1200&auto=format&fit=crop' },
                        { type: 'image', url: 'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?q=80&w=1200&auto=format&fit=crop' }
                    ] 
                },
                { 
                    id: '3', 
                    title: 'La Grande Mela', 
                    lat: 40.7128, 
                    lon: -74.0060, 
                    locationName: 'New York, USA', 
                    date: '2021-12-25',
                    description: 'Natale a Manhattan, tra luci e grattacieli',
                    media: [
                        { type: 'image', url: 'https://images.unsplash.com/photo-1496442226666-8d4a0e29e128?q=80&w=1200&auto=format&fit=crop' },
                        { type: 'image', url: 'https://images.unsplash.com/photo-1534430480872-3498386e7856?q=80&w=1200&auto=format&fit=crop' }
                    ] 
                }
            ]);

            const [showForm, setShowForm] = useState(false);
            const [selectedTripId, setSelectedTripId] = useState(null);
            const [showInstructions, setShowInstructions] = useState(true);
            
            const controlsRef = useRef();

            // Hide instructions after 8 seconds
            useEffect(() => {
                const timer = setTimeout(() => setShowInstructions(false), 8000);
                return () => clearTimeout(timer);
            }, []);

            const handleAddTrip = (tripData) => {
                const id = window.crypto?.randomUUID 
                    ? window.crypto.randomUUID() 
                    : Math.random().toString(36).substring(2, 9) + Date.now().toString(36);
                
                const newTrip = { ...tripData, id };
                setTrips(prev => [...prev, newTrip]);
                setShowForm(false);
                
                // Focus camera on new trip
                if (controlsRef.current) {
                    const dist = 4.5;
                    const vec = latLonToVector3(tripData.lat, tripData.lon, dist);
                    controlsRef.current.object.position.copy(vec);
                    controlsRef.current.update();
                }
                
                // Show the new trip details
                setTimeout(() => setSelectedTripId(id), 500);
            };

            const handleMarkerClick = useCallback((trip) => {
                setSelectedTripId(trip.id);
                
                if (controlsRef.current) {
                    const dist = 4.5;
                    const vec = latLonToVector3(trip.lat, trip.lon, dist);
                    controlsRef.current.object.position.copy(vec);
                    controlsRef.current.update();
                }
            }, []);

            const selectedTrip = trips.find(t => t.id === selectedTripId);

            return (
                <div className="w-full h-screen bg-[#020408] relative selection:bg-blue-500 selection:text-white overflow-hidden">
                    <Header tripCount={trips.length} />
                    
                    <Instructions 
                        visible={showInstructions} 
                        onDismiss={() => setShowInstructions(false)} 
                    />

                    {/* 3D Canvas */}
                    <div className="absolute inset-0 z-0">
                        <Canvas camera={{ position: [0, 0, 5], fov: 45 }}>
                            <color attach="background" args={['#020408']} />
                            
                            {/* Lighting */}
                            <ambientLight intensity={2.0} />
                            <directionalLight position={[5, 3, 5]} intensity={2.5} color="#ffffff" />
                            <directionalLight position={[-5, -2, -5]} intensity={1.0} color="#4da6ff" />
                            <pointLight position={[10, 10, 10]} intensity={1.5} color="#fff5e6" />
                            <pointLight position={[-10, -10, -5]} intensity={1.0} color="#a5c9ff" />
                            
                            {/* Stars background */}
                            <Stars 
                                radius={150} 
                                depth={60} 
                                count={6000} 
                                factor={5} 
                                saturation={0.2} 
                                fade 
                                speed={0.5} 
                            />
                            
                            <Suspense fallback={null}>
                                <Earth 
                                    trips={trips} 
                                    onMarkerClick={handleMarkerClick} 
                                    selectedTripId={selectedTripId}
                                />
                            </Suspense>
                            
                            <OrbitControls 
                                ref={controlsRef}
                                enablePan={false} 
                                enableDamping={true}
                                dampingFactor={0.08}
                                rotateSpeed={0.4}
                                minDistance={2.8} 
                                maxDistance={12} 
                                autoRotate={!selectedTripId && !showForm}
                                autoRotateSpeed={0.2}
                            />
                        </Canvas>
                    </div>

                    {/* Add Trip FAB */}
                    <div className="absolute bottom-8 right-8 z-30">
                        <button 
                            onClick={() => setShowForm(true)}
                            className="group bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white rounded-full p-5 shadow-lg shadow-blue-900/50 transition-all duration-300 transform hover:scale-110 flex items-center gap-3"
                        >
                            <Plus size={28} strokeWidth={2.5} />
                            <span className="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-500 ease-out whitespace-nowrap font-semibold text-lg pr-0 group-hover:pr-2">
                                Nuovo Viaggio
                            </span>
                        </button>
                    </div>

                    {/* Modals */}
                    {showForm && (
                        <TripForm 
                            onClose={() => setShowForm(false)} 
                            onSave={handleAddTrip} 
                        />
                    )}

                    {selectedTripId && (
                        <MemoryViewer 
                            trip={selectedTrip} 
                            onClose={() => setSelectedTripId(null)} 
                        />
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
