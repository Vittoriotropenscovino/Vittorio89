<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#globeViz{width:100%;height:100%}
#dbg{position:fixed;bottom:6px;left:6px;color:#0af;font:10px monospace;z-index:99;opacity:0.5}
canvas.stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
</style>
</head>
<body>
<canvas class="stars" id="starCanvas"></canvas>
<div id="globeViz"></div>
<div id="dbg">loading...</div>
<script>
var globe=null,_trips=[],_itineraries=[],_zoomFactor=1.0,_home=null,_ready=false,_showTravelLines=true,_scanAnimId=0;
var _visitedCountries=[],_countryFeatures=[],_flythroughActive=false;
var _currentAltitude=2.5;
var _selectedPinId=null;
var dbg=document.getElementById('dbg');
function L(m){if(dbg&&!_ready)dbg.textContent=m;S({type:'log',message:m});}
function S(d){try{if(window.ReactNativeWebView)window.ReactNativeWebView.postMessage(JSON.stringify(d));}catch(e){}}
window.onerror=function(m){S({type:'log',message:'ERR:'+m});return true;};

// === STAR FIELD BACKGROUND ===
(function(){
  var c=document.getElementById('starCanvas'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  var stars=[];
  for(var i=0;i<250;i++){
    stars.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*1.5+0.3,a:Math.random()*0.8+0.2,speed:Math.random()*0.003+0.001,phase:Math.random()*Math.PI*2});
  }
  function drawStars(){
    ctx.clearRect(0,0,c.width,c.height);
    var t=Date.now()*0.001;
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      var flicker=s.a*(0.6+0.4*Math.sin(t*s.speed*200+s.phase));
      ctx.beginPath();ctx.arc(s.x%c.width,s.y%c.height,s.r,0,6.28);
      ctx.fillStyle='rgba(180,220,255,'+flicker+')';ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

// Country alpha-2 -> ISO numeric code mapping for fog of war
var _isoToNumeric={AF:'004',AL:'008',DZ:'012',AD:'020',AO:'024',AG:'028',AR:'032',AM:'051',AU:'036',AT:'040',AZ:'031',BS:'044',BH:'048',BD:'050',BB:'052',BY:'112',BE:'056',BZ:'084',BJ:'204',BT:'064',BO:'068',BA:'070',BW:'072',BR:'076',BN:'096',BG:'100',BF:'854',BI:'108',KH:'116',CM:'120',CA:'124',CV:'132',CF:'140',TD:'148',CL:'152',CN:'156',CO:'170',KM:'174',CG:'178',CD:'180',CR:'188',CI:'384',HR:'191',CU:'192',CY:'196',CZ:'203',DK:'208',DJ:'262',DM:'212',DO:'214',EC:'218',EG:'818',SV:'222',GQ:'226',ER:'232',EE:'233',SZ:'748',ET:'231',FJ:'242',FI:'246',FR:'250',GA:'266',GM:'270',GE:'268',DE:'276',GH:'288',GR:'300',GD:'308',GT:'320',GN:'324',GW:'624',GY:'328',HT:'332',HN:'340',HU:'348',IS:'352',IN:'356',ID:'360',IR:'364',IQ:'368',IE:'372',IL:'376',IT:'380',JM:'388',JP:'392',JO:'400',KZ:'398',KE:'404',KI:'296',KP:'408',KR:'410',KW:'414',KG:'417',LA:'418',LV:'428',LB:'422',LS:'426',LR:'430',LY:'434',LI:'438',LT:'440',LU:'442',MG:'450',MW:'454',MY:'458',MV:'462',ML:'466',MT:'470',MH:'584',MR:'478',MU:'480',MX:'484',FM:'583',MD:'498',MC:'492',MN:'496',ME:'499',MA:'504',MZ:'508',MM:'104',NA:'516',NR:'520',NP:'524',NL:'528',NZ:'554',NI:'558',NE:'562',NG:'566',MK:'807',NO:'578',OM:'512',PK:'586',PW:'585',PS:'275',PA:'591',PG:'598',PY:'600',PE:'604',PH:'608',PL:'616',PT:'620',QA:'634',RO:'642',RU:'643',RW:'646',KN:'659',LC:'662',VC:'670',WS:'882',SM:'674',ST:'678',SA:'682',SN:'686',RS:'688',SC:'690',SL:'694',SG:'702',SK:'703',SI:'705',SB:'090',SO:'706',ZA:'710',SS:'728',ES:'724',LK:'144',SD:'729',SR:'740',SE:'752',CH:'756',SY:'760',TW:'158',TJ:'762',TZ:'834',TH:'764',TL:'626',TG:'768',TO:'776',TT:'780',TN:'788',TR:'792',TM:'795',TV:'798',UG:'800',UA:'804',AE:'784',GB:'826',US:'840',UY:'858',UZ:'860',VU:'548',VA:'336',VE:'862',VN:'704',YE:'887',ZM:'894',ZW:'716',XK:'926',GL:'304'};

// <!--VENDOR_SCRIPTS_PLACEHOLDER--> injected inline by EarthGlobe.tsx

function ensureLibsAndStart(){
  L('loading libs...');
  // Check if vendor scripts were injected inline
  var hasTopojson=typeof topojson!=='undefined';
  var hasGlobe=typeof Globe!=='undefined';

  if(hasTopojson&&hasGlobe){
    L('libs ok (bundled), loading map...');
    loadCountriesAndGo();
  }else{
    // Fallback: load from CDN
    L('loading libs from CDN...');
    loadJS('https://unpkg.com/topojson-client@3/dist/topojson-client.min.js',function(){
    loadJS('https://unpkg.com/globe.gl@2/dist/globe.gl.min.js',function(){
      if(typeof Globe==='undefined'){L('Globe.gl fail');return;}
      L('libs ok (CDN), loading map...');
      loadCountriesAndGo();
    });
    });
  }
}

function loadCountriesAndGo(){
  // Check if countries data was injected inline
  if(window.__COUNTRIES_DATA){
    L('map data (bundled)');
    processCountriesData(window.__COUNTRIES_DATA);
    return;
  }
  // Fallback: fetch from CDN
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(function(r){return r.json();})
    .then(function(topo){processCountriesData(topo);})
    .catch(function(){
      L('map fail, no countries');
      go({type:'FeatureCollection',features:[]});
    });
}

function processCountriesData(topo){
  var geo={type:'FeatureCollection',features:[]};
  try{
    if(typeof topojson!=='undefined'&&topo.objects){
      var k=topo.objects.countries?'countries':Object.keys(topo.objects)[0];
      geo=topojson.feature(topo,topo.objects[k]);
    }
  }catch(e){L('topo err:'+e.message);}
  _countryFeatures=geo.features||[];
  go(geo);
}

ensureLibsAndStart();

function loadJS(u,cb){var s=document.createElement('script');s.src=u;s.onload=cb;s.onerror=function(){L('script fail:'+u);cb();};document.head.appendChild(s);}

function isCountryVisited(feature){
  if(!_visitedCountries||_visitedCountries.length===0)return false;
  var fid=feature.id||'';
  for(var i=0;i<_visitedCountries.length;i++){
    var cc=_visitedCountries[i];
    if(!cc)continue;
    var numCode=_isoToNumeric[cc.toUpperCase()]||'';
    if(numCode&&numCode===String(fid))return true;
    if(String(fid)===cc)return true;
  }
  return false;
}

function go(countries){
  var el=document.getElementById('globeViz');
  var f=countries.features||[];
  L(f.length+' countries. rendering...');

  try{
    globe=Globe()
      .backgroundColor('rgba(0,0,0,0)')
      .showGlobe(true)
      .showAtmosphere(true)
      .atmosphereColor('#00d4ff')
      .atmosphereAltitude(0.25)

      // COUNTRY BORDERS - visited countries glow
      .polygonsData(f)
      .polygonCapColor(function(d){
        if(isCountryVisited(d))return 'rgba(0,220,255,0.12)';
        return 'rgba(0,0,0,0)';
      })
      .polygonSideColor(function(d){
        if(isCountryVisited(d))return 'rgba(0,220,255,0.3)';
        return 'rgba(0,200,255,0.05)';
      })
      .polygonStrokeColor(function(d){
        if(isCountryVisited(d))return 'rgba(0,230,255,0.8)';
        return 'rgba(0,220,255,0.25)';
      })
      .polygonAltitude(0.009)

      // TRIP MARKERS
      .pointsData([])
      .pointLat('lat').pointLng('lng')
      .pointColor(function(d){
        if(d.isHome)return '#FFD700';
        if(d.isCluster)return d.isWishlist?'#EC4899':'#EF4444';
        if(d.isWishlist)return '#EC4899';
        return '#EF4444';
      })
      .pointAltitude(function(d){
        if(d.isCluster)return 0.01+0.06*_zoomFactor;
        return 0.01+0.04*_zoomFactor;
      })
      .pointRadius(function(d){
        if(d.isHome)return 0.25+0.15*_zoomFactor;
        if(d.isCluster)return (0.15+0.12*_zoomFactor)*Math.min(1.5,1+d.clusterCount*0.05);
        return 0.12+0.10*_zoomFactor;
      })
      .pointResolution(8)

      // PULSING RINGS - red for trips, gold for home
      .ringsData([])
      .ringLat('lat').ringLng('lng')
      .ringColor(function(d){return function(t){
        var c=d.ringColor||'239,68,68';
        return 'rgba('+c+','+(1-t)*(d.isWishlist?0.4:0.6)+')';
      };})
      .ringMaxRadius(function(d){
        if(d.isCluster)return 0.8+1.5*_zoomFactor;
        return 0.6+1.2*_zoomFactor;
      })
      .ringPropagationSpeed(2.5)
      .ringRepeatPeriod(1200)

      // LABELS - trip title (visible only when zoomed in)
      .labelsData([])
      .labelLat('lat').labelLng('lng')
      .labelText(function(d){
        return d.label;
      })
      .labelSize(function(d){
        if(d.isCluster)return 0.4+0.5*_zoomFactor;
        return 0.2+0.35*_zoomFactor;
      })
      .labelDotRadius(function(d){
        return 0.08+0.12*_zoomFactor;
      })
      .labelColor(function(d){
        if(d._hidden)return 'rgba(0,0,0,0)';
        if(d.isCluster){
          if(_currentAltitude<=0.5)return 'rgba(255,255,255,0.95)';
          if(_currentAltitude>=1.2)return 'rgba(0,0,0,0)';
          var op=0.95*(1-(_currentAltitude-0.5)/0.7);
          return 'rgba(255,255,255,'+op+')';
        }
        var opacity=0;
        if(d.isHome){
          opacity=_currentAltitude>2.0?0.4:0.95;
        }else{
          if(_currentAltitude<=0.5)opacity=0.95;
          else if(_currentAltitude>=1.2)opacity=0.0;
          else opacity=0.95*(1-(_currentAltitude-0.5)/0.7);
        }
        if(d.isHome)return 'rgba(255,215,0,'+opacity+')';
        if(d.isWishlist)return 'rgba(236,72,153,'+opacity+')';
        return 'rgba(255,255,255,'+opacity+')';
      })
      .labelResolution(1)
      .labelAltitude(function(){
        return 0.015;
      })

      // ANIMATED ARCS
      .arcsData([])
      .arcColor(function(d){return d.colors||['rgba(239,68,68,0.9)','rgba(239,68,68,0.3)'];})
      .arcDashLength(0.5)
      .arcDashGap(0.1)
      .arcDashAnimateTime(2000)
      .arcStroke(0.8)
      .arcAltitudeAutoScale(0.45)

      // CUSTOM LAYER - floating particles
      .customLayerData([])
      .customThreeObject(function(d){
        if(typeof THREE==='undefined') return null;
        var g=new THREE.SphereGeometry(d.size||0.4,6,6);
        var m=new THREE.MeshBasicMaterial({color:new THREE.Color(d.color||'#EF4444'),transparent:true,opacity:d.opacity||0.6});
        return new THREE.Mesh(g,m);
      })
      .customThreeObjectUpdate(function(obj,d){
        Object.assign(obj.position,globe.getCoords(d.lat,d.lng,d.alt||0.15));
      })

      .onPointClick(onPin)
      .onLabelClick(onPin)
      (el);

    // Globe material
    try{
      var m=globe.globeMaterial();
      m.color.set('#122d54');
      m.emissive.set('#0d3560');
      m.emissiveIntensity=0.5;
      m.shininess=5;
    }catch(e){}

    // Scene enhancements
    try{
      var scene=globe.scene();
      if(typeof THREE!=='undefined'){
        var rimLight=new THREE.DirectionalLight(0x00d4ff,0.5);
        rimLight.position.set(-200,100,-200);
        scene.add(rimLight);

        var rimLight2=new THREE.DirectionalLight(0x4488ff,0.3);
        rimLight2.position.set(200,-50,100);
        scene.add(rimLight2);

        var ambLight=new THREE.AmbientLight(0x1a1a44,0.5);
        scene.add(ambLight);

        // Outer glow halo
        var glowGeo=new THREE.SphereGeometry(102,64,64);
        var glowMat=new THREE.MeshBasicMaterial({color:0x00d4ff,transparent:true,opacity:0.1,side:THREE.BackSide});
        var glowMesh=new THREE.Mesh(glowGeo,glowMat);
        scene.add(glowMesh);
        window._haloMesh=glowMesh;

        window._gridLines=[];
        var R=100.4;
        [-60,-30,0,30,60].forEach(function(lat){
          var phi=(90-lat)*Math.PI/180,v=[];
          for(var lo=0;lo<=360;lo+=4){var th=lo*Math.PI/180;v.push(R*Math.sin(phi)*Math.cos(th),R*Math.cos(phi),R*Math.sin(phi)*Math.sin(th));}
          var g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
          var line=new THREE.Line(g,new THREE.LineBasicMaterial({color:0x00d4ff,transparent:true,opacity:0.09}));
          scene.add(line);window._gridLines.push(line);
        });
        for(var lo=0;lo<360;lo+=30){
          var th=lo*Math.PI/180,v=[];
          for(var lt=-90;lt<=90;lt+=4){var p=(90-lt)*Math.PI/180;v.push(R*Math.sin(p)*Math.cos(th),R*Math.cos(p),R*Math.sin(p)*Math.sin(th));}
          var g2=new THREE.BufferGeometry();g2.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
          var line2=new THREE.Line(g2,new THREE.LineBasicMaterial({color:0x00d4ff,transparent:true,opacity:0.09}));
          scene.add(line2);window._gridLines.push(line2);
        }

        var scanRingGeo=new THREE.RingGeometry(100.2,100.8,48);
        var scanRingMat=new THREE.MeshBasicMaterial({color:0x00d4ff,transparent:true,opacity:0.12,side:THREE.DoubleSide});
        var scanRing=new THREE.Mesh(scanRingGeo,scanRingMat);
        scanRing.rotation.x=Math.PI/2;
        scene.add(scanRing);
        window._scannerRing=scanRing;

        function animateScanner(){
          _scanAnimId=requestAnimationFrame(animateScanner);
          scanRing.rotation.z+=0.003;
        }
        animateScanner();
      }
    }catch(e){}

    // Camera controls
    var c=globe.controls();
    c.autoRotate=true;
    c.autoRotateSpeed=0.4;
    c.enableDamping=true;
    c.dampingFactor=0.12;
    c.rotateSpeed=0.8;
    c.zoomSpeed=1.0;
    c.minDistance=70;
    c.maxDistance=600;
    c.enablePan=false;

    // Smart auto-rotate: pause on interaction, resume after 7s idle
    var _idleTimer=null;
    c.addEventListener('start',function(){c.autoRotate=false;if(_idleTimer)clearTimeout(_idleTimer);});
    c.addEventListener('end',function(){if(_idleTimer)clearTimeout(_idleTimer);_idleTimer=setTimeout(function(){if(!_flythroughActive)c.autoRotate=true;},7000);});

    // === ZOOM-ADAPTIVE VISUALS ===
    function updateZoomVisuals(dist){
      var t=Math.max(0,Math.min(1,(dist-70)/130));
      var visitedStrokeOp=0.8*t+0.15*(1-t);
      var visitedCapOp=0.12*t+0.02*(1-t);
      var visitedSideOp=0.3*t+0.05*(1-t);
      var unvisitedStrokeOp=0.25*t+0.08*(1-t);
      if(globe.polygonsData().length>0){
        globe
          .polygonStrokeColor(function(feat){
            return isCountryVisited(feat)
              ?'rgba(0,230,255,'+visitedStrokeOp+')'
              :'rgba(0,220,255,'+unvisitedStrokeOp+')';
          })
          .polygonCapColor(function(feat){
            return isCountryVisited(feat)
              ?'rgba(0,220,255,'+visitedCapOp+')'
              :'rgba(0,0,0,0)';
          })
          .polygonSideColor(function(feat){
            return isCountryVisited(feat)
              ?'rgba(0,220,255,'+visitedSideOp+')'
              :'rgba(0,200,255,'+(0.05*t)+')';
          });
      }
      globe.polygonAltitude(0.009*t+0.001*(1-t));
      globe.atmosphereAltitude(0.25*t+0.08*(1-t));
      if(window._haloMesh){window._haloMesh.material.opacity=0.1*t;}
      if(window._gridLines){
        var gridOp=0.09*t+0.01*(1-t);
        window._gridLines.forEach(function(l){l.material.opacity=gridOp;});
      }
      if(window._scannerRing){
        window._scannerRing.material.opacity=(0.06+0.06*Math.sin(Date.now()*0.001))*t;
      }
    }

    // === ZOOM-ADAPTIVE RENDERING ===
    try{
      var lastZoomUpdate=0;
      c.addEventListener('change',function(){
        var now=Date.now();
        if(now-lastZoomUpdate<100)return;
        lastZoomUpdate=now;
        try{
          var dist=c.object.position.length();
          updateZoomVisuals(dist);
          var f=Math.max(0.2,Math.min(1.5,(dist-100)/260));
          var alt=globe.pointOfView().altitude;
          var altChanged=(Math.abs(alt-_currentAltitude)>0.05);
          _currentAltitude=alt;
          if(Math.abs(f-_zoomFactor)>0.03||altChanged){
            _zoomFactor=f;
            c.autoRotateSpeed=0.4*Math.min(1,Math.max(0.02,(_zoomFactor-0.1)/1.0));
            renderPins();
          }
        }catch(ze){}
      });
    }catch(e){}

    globe.width(window.innerWidth).height(window.innerHeight);
    window.addEventListener('resize',function(){if(globe)globe.width(window.innerWidth).height(window.innerHeight);});

    document.addEventListener('message',onMsg);
    window.addEventListener('message',onMsg);

    _ready=true;
    setTimeout(function(){if(dbg)dbg.style.display='none';},2000);
    S({type:'ready'});
    L('ready');
  }catch(e){L('INIT ERR:'+e.message);}
}

function onPin(p){
  if(!p||!p.tripId)return;
  if(p.tripId==='__home__')return;
  if(p.isCluster){
    var pov=globe.pointOfView();
    var newAlt=Math.max(0.15,pov.altitude/2);
    globe.pointOfView({lat:p.lat,lng:p.lng,altitude:newAlt},1000);
    return;
  }
  _selectedPinId=p.tripId;
  var pov=globe.pointOfView();
  var newAlt=Math.max(0.15,pov.altitude/2);
  globe.pointOfView({lat:p.lat,lng:p.lng,altitude:newAlt},1000);
  S({type:'pinClick',tripId:p.tripId});
}

function onMsg(e){try{handleCmd(JSON.parse(typeof e.data==='string'?e.data:''));}catch(x){}}
function handleMessageFromRN(d){if(typeof d==='string'){try{d=JSON.parse(d);}catch(e){return;}}handleCmd(d);}
function handleCmd(d){
  try{
  if(!d||!d.type)return;
  if(d.type==='updateTrips'){_itineraries=d.itineraries||[];updateTrips(d.trips);}
  else if(d.type==='updateHome'){_home=d.home||null;renderPins();updateArcs();}
  else if(d.type==='updateTravelLines'){_showTravelLines=d.show!==false;updateArcs();}
  else if(d.type==='updateVisitedCountries'){
    _visitedCountries=d.countries||[];
    if(globe&&_countryFeatures.length>0){
      globe.polygonsData(_countryFeatures);
    }
  }
  else if(d.type==='flyTo'&&globe)globe.pointOfView({lat:d.lat,lng:d.lng,altitude:1.8},1500);
  else if(d.type==='flythrough')startFlythrough(d.stops);
  else if(d.type==='cleanup'){if(_scanAnimId)cancelAnimationFrame(_scanAnimId);if(globe){try{globe.scene().traverse(function(o){if(o.geometry)o.geometry.dispose();if(o.material){if(o.material.map)o.material.map.dispose();o.material.dispose();}});}catch(ce){}}}
  }catch(ex){S({type:'log',message:'CMD_ERR:'+ex.message});}
}

// === FLYTHROUGH ANIMATION ===
function startFlythrough(stops){
  if(!globe||!stops||stops.length<2||_flythroughActive)return;
  _flythroughActive=true;
  var ctrl=globe.controls();
  ctrl.autoRotate=false;
  var idx=0;
  function flyNext(){
    if(idx>=stops.length){
      _flythroughActive=false;
      ctrl.autoRotate=true;
      S({type:'flythroughDone'});
      return;
    }
    var stop=stops[idx];
    var alt=idx===0?2.5:1.8;
    var dur=idx===0?2000:2500;
    globe.pointOfView({lat:stop.lat,lng:stop.lng,altitude:alt},dur);
    idx++;
    setTimeout(flyNext,dur+800);
  }
  flyNext();
}

// === PIN OVERLAP FIX (fixed offset, no zoom dependency) ===
function spreadPins(pins){
  if(pins.length<2)return pins;
  for(var i=0;i<pins.length;i++){
    for(var j=i+1;j<pins.length;j++){
      var dlat=pins[i].lat-pins[j].lat;
      var dlng=pins[i].lng-pins[j].lng;
      var dist=Math.sqrt(dlat*dlat+dlng*dlng);
      if(dist<=0.0001){
        // Identical coords: fixed small circle offset
        var angle=(2*Math.PI*j)/Math.max(2,pins.length);
        pins[i].lat+=0.3*Math.sin(angle);
        pins[i].lng+=0.3*Math.cos(angle);
        pins[j].lat-=0.3*Math.sin(angle);
        pins[j].lng-=0.3*Math.cos(angle);
      }else if(dist<0.5){
        // Very close: tiny fixed nudge
        var nx=dlat/dist,ny=dlng/dist;
        var push=0.15*(0.5-dist)/0.5;
        pins[i].lat+=nx*push;
        pins[i].lng+=ny*push;
        pins[j].lat-=nx*push;
        pins[j].lng-=ny*push;
      }
    }
  }
  return pins;
}

// === PROJECT 3D COORDINATES TO SCREEN ===
function projectToScreen(lat,lng){
  try{
    if(typeof THREE==='undefined')return null;
    var phi=(90-lat)*Math.PI/180;
    var theta=(lng+180)*Math.PI/180;
    var R=100;
    var x=-R*Math.sin(phi)*Math.cos(theta);
    var y=R*Math.cos(phi);
    var z=R*Math.sin(phi)*Math.sin(theta);
    var vec=new THREE.Vector3(x,y,z);
    var ctrl=globe.controls();
    if(!ctrl||!ctrl.object)return null;
    var cam=ctrl.object;
    var camPos=cam.position;
    var toPoint=vec.clone().sub(camPos);
    var toCenter=new THREE.Vector3(0,0,0).sub(camPos);
    if(toPoint.dot(toCenter)>toCenter.lengthSq())return null;
    var projected=vec.clone().project(cam);
    return {
      x:(projected.x+1)/2*window.innerWidth,
      y:(-projected.y+1)/2*window.innerHeight
    };
  }catch(e){return null;}
}

// === DYNAMIC PIN CLUSTERING ===
function clusterPins(tripPins,trips){
  var MIN_DIST=35;
  var projected=[];
  for(var i=0;i<tripPins.length;i++){
    var s=projectToScreen(tripPins[i].lat,tripPins[i].lng);
    projected.push({idx:i,lat:tripPins[i].lat,lng:tripPins[i].lng,screen:s,
      tripId:trips[i].id,title:trips[i].title,isWishlist:trips[i].isWishlist||false});
  }
  var used={};var result=[];
  for(var i=0;i<projected.length;i++){
    if(used[i])continue;
    if(projected[i].tripId===_selectedPinId||!projected[i].screen){
      result.push({type:'single',points:[projected[i]],lat:projected[i].lat,lng:projected[i].lng});
      used[i]=true;continue;
    }
    var cluster=[projected[i]];used[i]=true;
    for(var j=i+1;j<projected.length;j++){
      if(used[j]||projected[j].tripId===_selectedPinId||!projected[j].screen)continue;
      var dx=projected[i].screen.x-projected[j].screen.x;
      var dy=projected[i].screen.y-projected[j].screen.y;
      if(Math.sqrt(dx*dx+dy*dy)<MIN_DIST){cluster.push(projected[j]);used[j]=true;}
    }
    if(cluster.length===1){
      result.push({type:'single',points:cluster,lat:cluster[0].lat,lng:cluster[0].lng});
    }else{
      var aLat=0,aLng=0;
      for(var k=0;k<cluster.length;k++){aLat+=cluster[k].lat;aLng+=cluster[k].lng;}
      aLat/=cluster.length;aLng/=cluster.length;
      result.push({type:'cluster',points:cluster,count:cluster.length,lat:aLat,lng:aLng,
        hasWishlist:cluster.some(function(p){return p.isWishlist;}),
        allWishlist:cluster.every(function(p){return p.isWishlist;})});
    }
  }
  return result;
}

// === RENDER PINS BASIC (fallback senza clustering/collision detection) ===
function renderPinsBasic(){
  if(!globe)return;
  var dp=[],dr=[],dl=[];

  if(_home){
    dp.push({lat:_home.latitude,lng:_home.longitude,tripId:'__home__',color:'#FFD700',isHome:true,clusterCount:1});
    dr.push({lat:_home.latitude,lng:_home.longitude,ringColor:'255,215,0'});
    dl.push({lat:_home.latitude,lng:_home.longitude,tripId:'__home__',label:_home.name||'Home',
      isHome:true,isWishlist:false,_hidden:false});
  }

  var tripPins=[];
  for(var i=0;i<_trips.length;i++){
    tripPins.push({lat:_trips[i].latitude,lng:_trips[i].longitude,idx:i});
  }
  tripPins=spreadPins(tripPins);

  for(var i=0;i<tripPins.length;i++){
    var trip=_trips[i];
    dp.push({lat:tripPins[i].lat,lng:tripPins[i].lng,tripId:trip.id,isHome:false,clusterCount:1,
      isWishlist:trip.isWishlist,color:trip.isWishlist?'#EC4899':'#EF4444'});
    dr.push({lat:tripPins[i].lat,lng:tripPins[i].lng,ringColor:trip.isWishlist?'236,72,153':'239,68,68',isWishlist:trip.isWishlist});
    dl.push({lat:tripPins[i].lat,lng:tripPins[i].lng,tripId:trip.id,label:trip.title,isHome:false,
      isWishlist:trip.isWishlist,_hidden:false});
  }

  globe.pointsData(dp).ringsData(dr).labelsData(dl);
}

// === RENDER INDIVIDUAL PINS ===
function renderPins(){
  if(!globe)return;
  var dp=[],dr=[],dl=[];

  // Home — sempre singolo, mai clusterizzato
  if(_home){
    dp.push({lat:_home.latitude,lng:_home.longitude,tripId:'__home__',color:'#FFD700',isHome:true,clusterCount:1});
    dr.push({lat:_home.latitude,lng:_home.longitude,ringColor:'255,215,0'});
  }

  // Spread + cluster (con fallback a rendering basico)
  var tripPins=[];
  for(var i=0;i<_trips.length;i++){
    tripPins.push({lat:_trips[i].latitude,lng:_trips[i].longitude,idx:i});
  }
  tripPins=spreadPins(tripPins);

  var clusters;
  try{
    clusters=clusterPins(tripPins,_trips);
  }catch(clusterErr){
    S({type:'log',message:'cluster fallback:'+clusterErr.message});
    renderPinsBasic();
    return;
  }

  for(var ci=0;ci<clusters.length;ci++){
    var cl=clusters[ci];
    if(cl.type==='cluster'){
      dp.push({lat:cl.lat,lng:cl.lng,tripId:'__cluster_'+ci,isHome:false,isCluster:true,
        clusterCount:cl.count,isWishlist:cl.allWishlist,color:cl.allWishlist?'#EC4899':'#EF4444'});
      dr.push({lat:cl.lat,lng:cl.lng,ringColor:cl.allWishlist?'236,72,153':'239,68,68',isWishlist:cl.allWishlist,isCluster:true});
      dl.push({lat:cl.lat,lng:cl.lng,tripId:'__cluster_'+ci,label:''+cl.count,isHome:false,
        isWishlist:cl.allWishlist,isCluster:true,_hidden:false});
    }else{
      var p=cl.points[0];
      dp.push({lat:p.lat,lng:p.lng,tripId:p.tripId,isHome:false,clusterCount:1,
        isWishlist:p.isWishlist,color:p.isWishlist?'#EC4899':'#EF4444'});
      dr.push({lat:p.lat,lng:p.lng,ringColor:p.isWishlist?'236,72,153':'239,68,68',isWishlist:p.isWishlist});
    }
  }

  // === LABEL COLLISION DETECTION (solo pin singoli) ===
  try{
  var candidates=[];
  if(_home){
    var hs=projectToScreen(_home.latitude,_home.longitude);
    candidates.push({lat:_home.latitude,lng:_home.longitude,tripId:'__home__',label:_home.name||'Home',
      isHome:true,isWishlist:false,sx:hs?hs.x:-9999,sy:hs?hs.y:-9999,visible:!!hs,priority:100});
  }
  for(var ci=0;ci<clusters.length;ci++){
    var cl=clusters[ci];
    if(cl.type==='single'){
      var p=cl.points[0];
      var ss=projectToScreen(p.lat,p.lng);
      var pri=p.tripId===_selectedPinId?50:0;
      candidates.push({lat:p.lat,lng:p.lng,tripId:p.tripId,label:p.title,isHome:false,
        isWishlist:p.isWishlist,sx:ss?ss.x:-9999,sy:ss?ss.y:-9999,visible:!!ss,priority:pri});
    }
  }
  candidates.sort(function(a,b){return b.priority-a.priority;});
  var LABEL_W=120,LABEL_H=20;
  var exScale=Math.max(1,2.5-_currentAltitude);
  var accepted=[],acceptedIds={};
  for(var i=0;i<candidates.length;i++){
    var cand=candidates[i];
    if(!cand.visible)continue;
    var overlaps=false;
    for(var j=0;j<accepted.length;j++){
      var ex=accepted[j];
      if(Math.abs(cand.sx-ex.sx)<LABEL_W*exScale&&Math.abs(cand.sy-ex.sy)<LABEL_H*exScale){overlaps=true;break;}
    }
    if(!overlaps){accepted.push(cand);acceptedIds[cand.tripId]=true;}
  }
  for(var i=0;i<candidates.length;i++){
    var c=candidates[i];
    dl.push({lat:c.lat,lng:c.lng,tripId:c.tripId,label:c.label,isHome:c.isHome,
      isWishlist:c.isWishlist,_hidden:!acceptedIds[c.tripId]});
  }
  }catch(labelErr){
    // Fallback: mostra tutte le label senza collision detection
    for(var i=0;i<_trips.length;i++){
      dl.push({lat:_trips[i].latitude,lng:_trips[i].longitude,tripId:_trips[i].id,
        label:_trips[i].title,isHome:false,isWishlist:_trips[i].isWishlist||false,_hidden:false});
    }
    if(_home){
      dl.push({lat:_home.latitude,lng:_home.longitude,tripId:'__home__',label:_home.name||'Home',
        isHome:true,isWishlist:false,_hidden:false});
    }
  }

  globe.pointsData(dp).ringsData(dr).labelsData(dl);
}

// === UPDATE ARCS (separate from clustering) ===
function updateArcs(){
  if(!globe)return;
  var t=_trips;
  if(!t||t.length===0){globe.arcsData([]);return;}
  var a=[];
  // Home->trip arcs (per-trip showArc, not wishlist)
  if(_home){
    t.forEach(function(x){
      if(x.showArc&&!x.isWishlist){
        a.push({
          startLat:_home.latitude,startLng:_home.longitude,
          endLat:x.latitude,endLng:x.longitude,
          colors:['rgba(255,215,0,0.9)','rgba(239,68,68,0.6)']
        });
      }
    });
  }
  // Itinerary arcs (global toggle)
  if(_showTravelLines&&_itineraries&&_itineraries.length>0){
    var tripMap={};
    t.forEach(function(x){tripMap[x.id]=x;});
    _itineraries.forEach(function(itin){
      var ids=itin.tripIds||[];
      for(var j=0;j<ids.length-1;j++){
        var t1=tripMap[ids[j]],t2=tripMap[ids[j+1]];
        if(t1&&t2){
          a.push({
            startLat:t1.latitude,startLng:t1.longitude,
            endLat:t2.latitude,endLng:t2.longitude,
            colors:['rgba(245,158,11,0.9)','rgba(245,158,11,0.5)']
          });
        }
      }
    });
  }
  globe.arcsData(a);
}

// === MAIN UPDATE FUNCTION ===
function updateTrips(t){
  if(!globe||!t)return;
  // Copy trip data (spreading is handled dynamically in renderPins based on zoom)
  _trips=t.map(function(x){
    return{id:x.id,title:x.title,latitude:x.latitude,longitude:x.longitude,isWishlist:x.isWishlist||false,showArc:x.showArc||false};
  });

  renderPins();
  updateArcs();

  // Floating particles (red for trips, pink for wishlist)
  var particles=[];
  t.forEach(function(x){
    var pColor=x.isWishlist?'#EC4899':'#EF4444';
    var pCount=x.isWishlist?1:2;
    for(var j=0;j<pCount;j++){
      particles.push({
        lat:x.latitude+(Math.random()-0.5)*3,
        lng:x.longitude+(Math.random()-0.5)*3,
        alt:0.05+Math.random()*0.1,
        size:0.15+Math.random()*0.2,
        color:pColor,
        opacity:x.isWishlist?0.2+Math.random()*0.2:0.3+Math.random()*0.3
      });
    }
  });
  globe.customLayerData(particles);
}
