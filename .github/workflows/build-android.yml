name: Build Android AAB (Production)

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

jobs:
  build:
    name: Build AAB (signed)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Fix Expo dependency versions
        run: npx expo install --fix

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > travelsphere-release.keystore
          ls -lh travelsphere-release.keystore

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Patch android/app/build.gradle for API 35
        run: |
          set -e
          GRADLE_FILE="android/app/build.gradle"

          if [ ! -f "$GRADLE_FILE" ]; then
            echo "ERROR: $GRADLE_FILE not found after prebuild"
            exit 1
          fi

          echo "=== ORIGINAL build.gradle (android block) ==="
          grep -A 20 "^android {" "$GRADLE_FILE" | head -30
          echo "================================================"

          # Forza compileSdk a 35
          sed -i 's/compileSdk [0-9]\+/compileSdk 35/g' "$GRADLE_FILE"
          sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 35/g' "$GRADLE_FILE"

          # Forza targetSdkVersion a 35
          sed -i 's/targetSdkVersion [0-9]\+/targetSdkVersion 35/g' "$GRADLE_FILE"

          # Forza buildToolsVersion
          sed -i 's/buildToolsVersion ["'\''"][0-9.]\+["'\''"]/buildToolsVersion "35.0.0"/g' "$GRADLE_FILE"

          # Se non c'e' buildToolsVersion, aggiungilo dopo compileSdk
          if ! grep -q "buildToolsVersion" "$GRADLE_FILE"; then
            sed -i '/compileSdk 35/a\    buildToolsVersion "35.0.0"' "$GRADLE_FILE"
          fi

          echo "=== PATCHED build.gradle (android block) ==="
          grep -A 20 "^android {" "$GRADLE_FILE" | head -30
          echo "================================================"

          # Verifiche finali
          if ! grep -q "compileSdk 35\|compileSdkVersion 35" "$GRADLE_FILE"; then
            echo "ERROR: compileSdk 35 not found after patch"
            exit 1
          fi
          if ! grep -q "targetSdkVersion 35" "$GRADLE_FILE"; then
            echo "ERROR: targetSdkVersion 35 not found after patch"
            exit 1
          fi
          if ! grep -q 'buildToolsVersion "35.0.0"' "$GRADLE_FILE"; then
            echo "ERROR: buildToolsVersion 35.0.0 not found after patch"
            exit 1
          fi

          echo "SUCCESS: build.gradle patched for API 35"

      - name: Patch android/build.gradle (root) for API 35
        run: |
          set -e
          ROOT_GRADLE="android/build.gradle"

          if [ -f "$ROOT_GRADLE" ]; then
            # Cerca buildscript.ext blocks e forza le versioni
            sed -i 's/compileSdkVersion = [0-9]\+/compileSdkVersion = 35/g' "$ROOT_GRADLE"
            sed -i 's/targetSdkVersion = [0-9]\+/targetSdkVersion = 35/g' "$ROOT_GRADLE"
            sed -i 's/buildToolsVersion = ["'\''"][0-9.]\+["'\''"]/buildToolsVersion = "35.0.0"/g' "$ROOT_GRADLE"

            echo "=== android/build.gradle after patch ==="
            grep -E "compileSdkVersion|targetSdkVersion|buildToolsVersion" "$ROOT_GRADLE" || echo "(nessun match, forse non serve)"
            echo "========================================"
          else
            echo "android/build.gradle (root) non trovato, skip"
          fi

      - name: Verify BILLING permission in generated manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"
          if grep -q 'com.android.vending.BILLING' "$MANIFEST"; then
            echo "OK: com.android.vending.BILLING present in AndroidManifest.xml"
          else
            echo "::warning::BILLING missing from generated manifest — injecting as fallback"
            # Fallback: inject just before the closing </manifest> tag
            sed -i 's|</manifest>|    <uses-permission android:name="com.android.vending.BILLING" />\n</manifest>|' "$MANIFEST"
            grep -q 'com.android.vending.BILLING' "$MANIFEST" || { echo "::error::Failed to inject BILLING permission"; exit 1; }
            echo "OK: BILLING injected via fallback"
          fi

      - name: Configure signing in gradle
        run: |
          cat >> android/gradle.properties << EOF
          TRAVELSPHERE_UPLOAD_STORE_FILE=../../travelsphere-release.keystore
          TRAVELSPHERE_UPLOAD_KEY_ALIAS=${{ secrets.KEYSTORE_ALIAS }}
          TRAVELSPHERE_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          TRAVELSPHERE_UPLOAD_KEY_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          EOF

      - name: Patch build.gradle with signing config
        run: |
          python3 << 'EOF'
          import re, sys

          path = 'android/app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()

          def find_matching_brace(s, start):
              """Given position right after an opening '{', return position of matching '}'."""
              depth = 0
              i = start
              while i < len(s):
                  c = s[i]
                  if c == '{':
                      depth += 1
                  elif c == '}':
                      if depth == 0:
                          return i
                      depth -= 1
                  i += 1
              return -1

          release_signing = (
              "        release {\n"
              "            if (project.hasProperty('TRAVELSPHERE_UPLOAD_STORE_FILE')) {\n"
              "                storeFile file(TRAVELSPHERE_UPLOAD_STORE_FILE)\n"
              "                storePassword TRAVELSPHERE_UPLOAD_STORE_PASSWORD\n"
              "                keyAlias TRAVELSPHERE_UPLOAD_KEY_ALIAS\n"
              "                keyPassword TRAVELSPHERE_UPLOAD_KEY_PASSWORD\n"
              "            }\n"
              "        }\n"
          )

          # 1) Inject `release { ... }` INTO the existing `signingConfigs { ... }` block.
          #    The Expo template already provides `signingConfigs { debug { ... } }`,
          #    so we merge rather than creating a second top-level block.
          sc_match = re.search(r'signingConfigs\s*\{', content)
          if sc_match:
              after_open = sc_match.end()
              close_idx = find_matching_brace(content, after_open)
              if close_idx < 0:
                  print("ERROR: could not find matching '}' for signingConfigs block", file=sys.stderr)
                  sys.exit(1)
              block_body = content[after_open:close_idx]
              if re.search(r'\brelease\s*\{', block_body) is None:
                  content = content[:after_open] + "\n" + release_signing + content[after_open:]
                  print("Injected release {} inside existing signingConfigs block.")
              else:
                  print("release {} already present in signingConfigs block; leaving as-is.")
          else:
              # No signingConfigs block at all — create one just after `android {`.
              block = "\n    signingConfigs {\n" + release_signing + "    }\n"
              content, n = re.subn(r'(android\s*\{)', r'\1' + block, content, count=1)
              if n == 0:
                  print("ERROR: could not locate `android {` to insert signingConfigs block", file=sys.stderr)
                  sys.exit(1)
              print("Created new signingConfigs block with release {}.")

          # 2) Inside the release buildType block, swap signingConfigs.debug -> .release.
          #    The previous regex-only approach failed because `[^}]*` cannot cross the
          #    closing `}` of the preceding `debug { ... }` block — so the replacement
          #    silently did nothing and the AAB ended up signed with the debug key.
          bt_match = re.search(r'buildTypes\s*\{', content)
          if not bt_match:
              print("ERROR: could not find buildTypes { block", file=sys.stderr)
              sys.exit(1)
          bt_after_open = bt_match.end()
          bt_close = find_matching_brace(content, bt_after_open)
          if bt_close < 0:
              print("ERROR: could not find matching '}' for buildTypes block", file=sys.stderr)
              sys.exit(1)

          rel_match = re.search(r'\brelease\s*\{', content[bt_after_open:bt_close])
          if not rel_match:
              print("ERROR: could not find release {} inside buildTypes", file=sys.stderr)
              sys.exit(1)
          rel_after_open = bt_after_open + rel_match.end()
          rel_close = find_matching_brace(content, rel_after_open)
          if rel_close < 0:
              print("ERROR: could not find matching '}' for release buildType", file=sys.stderr)
              sys.exit(1)

          rel_body = content[rel_after_open:rel_close]
          new_rel_body, n_sub = re.subn(
              r'signingConfig\s+signingConfigs\.debug',
              'signingConfig signingConfigs.release',
              rel_body,
          )
          if n_sub == 0:
              if 'signingConfig signingConfigs.release' in rel_body:
                  print("release buildType already points at signingConfigs.release; ok.")
              else:
                  # No signingConfig line at all — add one.
                  new_rel_body = "\n            signingConfig signingConfigs.release" + rel_body
                  print("Inserted signingConfig signingConfigs.release into release buildType.")
          else:
              print(f"Replaced {n_sub} occurrence(s) of signingConfigs.debug -> .release in release buildType.")

          content = content[:rel_after_open] + new_rel_body + content[rel_close:]

          with open(path, 'w') as f:
              f.write(content)

          print("build.gradle patched successfully.")
          EOF

      - name: Dump patched build.gradle (for debugging)
        run: |
          echo "=== android/app/build.gradle (post-patch) ==="
          cat android/app/build.gradle
          echo "=== android/gradle.properties (signing-related) ==="
          grep -E '^(TRAVELSPHERE_UPLOAD_|MYAPP_UPLOAD_)' android/gradle.properties || true

      - name: Build AAB with Gradle
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Find and rename AAB
        run: |
          AAB_PATH=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          if [ -n "$AAB_PATH" ]; then
            cp "$AAB_PATH" TravelSphere-release.aab
            echo "AAB built successfully: TravelSphere-release.aab"
            ls -lh TravelSphere-release.aab
          else
            echo "ERROR: No AAB found!"
            find android/app/build/outputs/ -type f 2>/dev/null || echo "No build outputs found"
            exit 1
          fi

      - name: Verify AAB is signed with release key (not debug)
        run: |
          set -e
          AAB=TravelSphere-release.aab
          echo "=== keytool -printcert -jarfile $AAB ==="
          keytool -printcert -jarfile "$AAB" | tee /tmp/aab-cert.txt
          if grep -qi 'CN=Android Debug' /tmp/aab-cert.txt; then
            echo "::error::AAB is still signed with the Android Debug key. Play Console will reject it."
            exit 1
          fi
          if ! grep -qi 'CN=TravelSphere' /tmp/aab-cert.txt; then
            echo "::error::AAB certificate Owner is not CN=TravelSphere. Check keystore/alias."
            exit 1
          fi
          echo "OK: AAB is signed with a non-debug certificate (CN=TravelSphere)."

      - name: Verify BILLING permission in final AAB
        run: |
          set -e
          AAB=TravelSphere-release.aab
          # base/manifest/AndroidManifest.xml inside the AAB is in protobuf binary
          # format, but permission names are stored as literal UTF-8 strings — so
          # `strings | grep` reliably detects them without needing bundletool/aapt.
          if unzip -p "$AAB" base/manifest/AndroidManifest.xml | strings | grep -q 'com.android.vending.BILLING'; then
            echo "OK: com.android.vending.BILLING present in AAB manifest."
          else
            echo "::error::BILLING permission is NOT present in the built AAB. Play Console will reject in-app product creation."
            echo "--- permission strings in AAB manifest ---"
            unzip -p "$AAB" base/manifest/AndroidManifest.xml | strings | grep -Ei 'permission|BILLING' || true
            exit 1
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v5
        with:
          name: TravelSphere-AAB
          path: TravelSphere-release.aab
          retention-days: 30

      - name: Build APK with Gradle (for local testing)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find and rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" TravelSphere-release.apk
            echo "APK built successfully: TravelSphere-release.apk"
            ls -lh TravelSphere-release.apk
          else
            echo "ERROR: No APK found!"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: TravelSphere-APK
          path: TravelSphere-release.apk
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: rm -f travelsphere-release.keystore
