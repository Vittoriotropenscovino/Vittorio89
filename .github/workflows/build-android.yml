name: Build Android APK

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Fix Expo dependency versions
        run: npx expo install --fix

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build APK with Gradle
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find and rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" TravelSphere.apk
            echo "APK built successfully: TravelSphere.apk"
            ls -lh TravelSphere.apk
          else
            echo "ERROR: No APK found!"
            find android/app/build/outputs/ -type f 2>/dev/null || echo "No build outputs found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TravelSphere-APK
          path: TravelSphere.apk
          retention-days: 30
