name: Generate Release Keystore

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    name: Generate production keystore
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore travelsphere-release.keystore \
            -alias travelsphere \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass 'Oggimisentolibero89--' \
            -keypass 'Oggimisentolibero89--' \
            -dname "CN=TravelSphere, OU=Mobile Development, O=TravelSphere, L=Rome, ST=Lazio, C=IT"

          echo "Keystore generated successfully."
          ls -lh travelsphere-release.keystore

      - name: Encode keystore to base64
        run: |
          base64 -w 0 travelsphere-release.keystore > travelsphere-release.keystore.base64
          echo "Base64 file created."
          ls -lh travelsphere-release.keystore.base64

      - name: Generate fingerprint info
        run: |
          keytool -list -v \
            -keystore travelsphere-release.keystore \
            -alias travelsphere \
            -storepass 'Oggimisentolibero89--' > keystore-info.txt

          echo "=== KEYSTORE INFO ==="
          cat keystore-info.txt

      - name: Upload keystore artifacts
        uses: actions/upload-artifact@v5
        with:
          name: TravelSphere-Keystore
          path: |
            travelsphere-release.keystore
            travelsphere-release.keystore.base64
            keystore-info.txt
          retention-days: 7
